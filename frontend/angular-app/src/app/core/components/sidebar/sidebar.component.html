<aside class="app-sidebar h-100">
  <div class="brand app-brand">
    
    <span class="brand-text ms-2">CarService</span>
  </div>
  <div class="nav-section">Main</div>
  <ul class="nav flex-column">
    <li class="nav-item">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">
        <span class="nav-text">Dashboard</span>
      </a>
    </li>
    <!-- Profile: only for customers — admin has no personal profile to edit -->
    <li class="nav-item" *ngIf="!isAdmin">
      <a routerLink="/profile" routerLinkActive="active" class="nav-link">
        <span class="nav-text">Profile</span>
      </a>
    </li>
    <!-- Vehicles: only for customers — admin doesn't own vehicles -->
    <li class="nav-item" *ngIf="!isAdmin">
      <a routerLink="/vehicles" routerLinkActive="active" class="nav-link">
        <span class="nav-text">Vehicles</span>
      </a>
    </li>
    <!-- Categories & Services: admin management pages -->
    <li class="nav-item" *ngIf="isAdmin">
      <a routerLink="/categories" routerLinkActive="active" class="nav-link">
        <span class="nav-text">Categories</span>
      </a>
    </li>
    <li class="nav-item" *ngIf="isAdmin">
      <a routerLink="/services" routerLinkActive="active" class="nav-link">
        <span class="nav-text">Services</span>
      </a>
    </li>
    <!-- My Bookings: only for customers — admin sees all bookings on the dashboard -->
    <li class="nav-item" *ngIf="!isAdmin">
      <a routerLink="/bookings" routerLinkActive="active" class="nav-link">
        <span class="nav-text">My Bookings</span>
      </a>
    </li>
  </ul>
  <div class="mt-auto p-3 small text-secondary sidebar-footer">
    <div class="text-uppercase" style="font-size: .7rem; letter-spacing: .08em;">Signed in</div>
    <div class="text-white">{{ userName }}</div>
    <div>{{ userRole }}</div>
  </div>
</aside>
