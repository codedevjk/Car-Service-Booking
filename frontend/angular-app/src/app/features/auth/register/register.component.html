<div class="auth-wrapper">
  <div class="card auth-card shadow-lg border-0" style="max-width: 560px;">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <h1 class="h4 mb-1">Create your account</h1>
        <p class="text-secondary small mb-0">Register as a customer</p>
      </div>

      <div *ngIf="error" class="alert alert-danger py-2 small">{{ error }}</div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate>
        <div class="row g-3">
          <div class="col-md-12">
            <label class="form-label small fw-semibold">Full Name</label>
            <input
              type="text"
              class="form-control"
              [class.is-invalid]="registerForm.get('fullName')?.invalid && registerForm.get('fullName')?.touched"
              formControlName="fullName"
            />
            <div *ngIf="registerForm.get('fullName')?.hasError('required')" class="invalid-feedback">
              Please provide a valid fullName
            </div>
          </div>

          <div class="col-md-12">
            <label class="form-label small fw-semibold">Email</label>
            <input
              type="email"
              class="form-control"
              [class.is-invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
              formControlName="email"
            />
            <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="invalid-feedback">
              Please provide a valid email
            </div>
          </div>

          <div class="col-md-12">
            <label class="form-label small fw-semibold">Password</label>
            <input
              type="password"
              class="form-control"
              [class.is-invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
              formControlName="password"
            />
            <div *ngIf="registerForm.get('password')?.hasError('required')" class="invalid-feedback">
              Please provide a valid password
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-4" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Creating...' : 'Create account' }}
        </button>
      </form>

      <div class="text-center mt-3 small text-secondary">
        Already have an account? <a routerLink="/auth/login">Sign in</a>
      </div>
    </div>
  </div>
</div>
