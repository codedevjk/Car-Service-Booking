<div class="auth-wrapper">
  <div class="card auth-card shadow-lg border-0">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        
        <h1 class="h4 mt-2 mb-1">Welcome back</h1>
        <p class="text-secondary small mb-0">Sign in to your Car Service account</p>
      </div>

      <div *ngIf="error" class="alert alert-danger py-2 small">{{ error }}</div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
        <div class="mb-3">
          <label class="form-label small fw-semibold">Email</label>
          <input
            type="email"
            class="form-control"
            [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
            placeholder="you@example.com"
            formControlName="email"
          />
          <div *ngIf="loginForm.get('email')?.hasError('required')" class="invalid-feedback">
            Please provide a valid email
          </div>
          <div *ngIf="loginForm.get('email')?.hasError('email')" class="invalid-feedback">
            Invalid email format
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-semibold">Password</label>
          <input
            type="password"
            class="form-control"
            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            formControlName="password"
          />
          <div *ngIf="loginForm.get('password')?.hasError('required')" class="invalid-feedback">
            Please provide a valid password
          </div>
          <div *ngIf="loginForm.get('password')?.hasError('minlength')" class="invalid-feedback">
            Minimum 6 characters
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Signing in...' : 'Sign in' }}
        </button>
      </form>

      <div class="text-center mt-4 small text-secondary">
        Don't have an account? <a routerLink="/auth/register">Register</a>
      </div>
      <div class="text-center mt-3 small text-muted">
        Demo: <code>admin@gmail.com / admin1234</code> or <code>user@gmail.com / user1234</code>
      </div>
    </div>
  </div>
</div>
