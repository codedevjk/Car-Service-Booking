<div class="row">
  <!-- Sidebar for Categories -->
  <div class="col-md-3">
    <div class="card mb-3">
      <div class="card-header bg-white fw-bold">Categories</div>
      <div class="list-group list-group-flush">
        <button type="button" class="list-group-item list-group-item-action" [class.active]="!selectedCategoryId"
          (click)="selectCategory(undefined)">
          All Categories
        </button>
        <button *ngFor="let cat of categories" type="button" class="list-group-item list-group-item-action"
          [class.active]="selectedCategoryId === cat.id" (click)="selectCategory(cat.id)">
          {{ cat.name }}
          <div class="small text-secondary" *ngIf="cat.description">{{ cat.description }}</div>
        </button>
      </div>
    </div>
  </div>

  <!-- Main Content for Service Packages -->
  <div class="col-md-9">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
      <h2 class="h4 mb-0">Service Packages</h2>

      <div class="d-flex gap-2">
        <input type="text" class="form-control" placeholder="Search by name..." [(ngModel)]="searchQuery"
          (keyup)="onSearchChange()">

        <select class="form-select" style="min-width: 150px;" (change)="onSortChange($event)">
          <option value="name,asc">Name (A-Z)</option>
          <option value="name,desc">Name (Z-A)</option>
          <option value="price,asc">Price (Low-High)</option>
          <option value="price,desc">Price (High-Low)</option>
        </select>
      </div>
    </div>

    <div class="text-end mb-3"><span class="text-secondary small">{{ totalElements }} total packages found</span></div>

    <div class="row g-3">
      <div class="col-md-6 col-lg-4" *ngFor="let pkg of servicePackages">
        <div class="card h-100 shadow-sm border-0">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title mb-2">{{ pkg.name }}</h5>
            <p class="card-text text-secondary small flex-grow-1">{{ pkg.description }}</p>
            <div class="mt-3 d-flex justify-content-between align-items-center">
              <span class="fw-bold fs-5 text-primary">₹{{ pkg.price }}</span>
              <!-- Book button, routing to booking module -->
              <button class="btn btn-sm btn-outline-primary" [routerLink]="['/bookings/new']"
                [queryParams]="{serviceId: pkg.id}">Select</button>
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 text-center py-5" *ngIf="servicePackages.length === 0">
        <p class="text-secondary">No service packages found for this category.</p>
      </div>
    </div>

    <!-- Pagination -->
    <nav class="mt-4" *ngIf="totalPages > 1">
      <ul class="pagination justify-content-center">
        <li class="page-item" [class.disabled]="page === 0">
          <button class="page-link" (click)="changePage(page - 1)">Previous</button>
        </li>
        <li class="page-item disabled">
          <span class="page-link">Page {{ page + 1 }} of {{ totalPages }}</span>
        </li>
        <li class="page-item" [class.disabled]="page >= totalPages - 1">
          <button class="page-link" (click)="changePage(page + 1)">Next</button>
        </li>
      </ul>
    </nav>
  </div>
</div>
