<div *ngIf="isLoading" class="text-secondary">Loading...</div>

<div *ngIf="!isLoading && user">
  <h1 class="page-title mb-4">My Profile</h1>
  <div class="row g-4">
    <div class="col-lg-4">
      <div class="card">
        <div class="card-body text-center">
          <div class="rounded-circle bg-primary text-white d-inline-flex align-items-center justify-content-center mb-3" style="width: 96px; height: 96px; font-size: 2rem;">
            {{ user.fullName ? user.fullName[0] : 'U' }}
          </div>
          <h5 class="mb-0">{{ user.fullName }}</h5>
          <div class="text-secondary small">{{ user.email }}</div>
          <span class="badge text-bg-primary mt-2">{{ user.role || 'Customer' }}</span>
        </div>
      </div>
    </div>
    
    <div class="col-lg-8">
      <div class="card">
        <div class="card-header bg-white"><h2 class="h6 mb-0">Update details</h2></div>
        <div class="card-body">
          <div *ngIf="msg" class="alert alert-success py-2 small">{{ msg }}</div>
          
          <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" novalidate>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label small fw-semibold">User ID (read-only)</label>
                <input class="form-control" formControlName="userId" />
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-semibold">Email (read-only)</label>
                <input class="form-control" formControlName="email" />
              </div>
              <div class="col-md-12">
                <label class="form-label small fw-semibold">Full name</label>
                <input class="form-control" [class.is-invalid]="profileForm.get('fullName')?.invalid && profileForm.get('fullName')?.touched" formControlName="fullName" />
                <div *ngIf="profileForm.get('fullName')?.hasError('required')" class="invalid-feedback">
                  Please provide a valid fullName
                </div>
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-semibold">Contact Number</label>
                <input class="form-control" formControlName="contactNumber" />
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-semibold">Address</label>
                <input class="form-control" formControlName="address" />
              </div>
            </div>
            
            <button class="btn btn-primary mt-4" [disabled]="isSubmitting">Save changes</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
