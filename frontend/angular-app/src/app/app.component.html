<div class="app-shell" [class.is-collapsed]="isCollapsed" [class.is-mobile]="isMobile" [class.mobile-open]="mobileOpen">
  <ng-container *ngIf="!router.url.includes('/auth')">
    <div class="app-backdrop" *ngIf="isMobile && mobileOpen" (click)="closeMobileSidebar()"></div>
    <app-sidebar (click)="closeMobileSidebar()"></app-sidebar>
  </ng-container>
  
  <div class="app-content" [style.padding]="router.url.includes('/auth') ? '0' : ''">
    <app-header *ngIf="!router.url.includes('/auth')" (toggleSidebar)="toggleSidebar()"></app-header>
    <main class="app-main" [style.padding]="router.url.includes('/auth') ? '0' : ''">
      <router-outlet></router-outlet>
    </main>
    <app-footer *ngIf="!router.url.includes('/auth')"></app-footer>
  </div>
</div>
